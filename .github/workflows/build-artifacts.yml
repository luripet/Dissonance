name: Build Artifacts

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      ipa_repo:
        description: "Private repo that hosts IPA file (owner/repo)"
        required: false
        type: string
      ipa_ref:
        description: "Branch / tag / commit to read IPA from"
        required: false
        type: string
      ipa_path:
        description: "IPA file path inside the repository"
        required: false
        type: string

jobs:
  build:
    runs-on: macos-15
    env:
      IPA_SOURCE_REPO: ${{ github.event.inputs.ipa_repo || secrets.PRIVATE_IPA_REPO || 'luripet/DissonaceIPA' }}
      IPA_SOURCE_REF: ${{ github.event.inputs.ipa_ref || secrets.PRIVATE_IPA_REF || 'main' }}
      IPA_SOURCE_PATH: ${{ github.event.inputs.ipa_path || secrets.PRIVATE_IPA_PATH || 'discord.ipa' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check cache key
        run: |
          echo upstream_heads=`git ls-remote https://github.com/theos/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Set GNU Make path
        run: |
          echo "PATH=$(brew --prefix make)/libexec/gnubin:$PATH" >> $GITHUB_ENV

      - name: Validate Private IPA Source
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_IPA_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "PRIVATE_IPA_TOKEN secret is required."
            exit 1
          fi

          if [ -z "${IPA_SOURCE_REPO}" ] || [ -z "${IPA_SOURCE_REF}" ] || [ -z "${IPA_SOURCE_PATH}" ]; then
            echo "IPA source settings are missing. Set workflow inputs or PRIVATE_IPA_REPO/PRIVATE_IPA_REF/PRIVATE_IPA_PATH secrets."
            exit 1
          fi

      - name: Checkout IPA source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IPA_SOURCE_REPO }}
          ref: ${{ env.IPA_SOURCE_REF }}
          token: ${{ secrets.PRIVATE_IPA_TOKEN }}
          path: ipa-source
          fetch-depth: 1
          lfs: true

      - name: Copy IPA from private repository
        run: |
          SOURCE_IPA_PATH="$GITHUB_WORKSPACE/ipa-source/${IPA_SOURCE_PATH}"
          if [ ! -f "$SOURCE_IPA_PATH" ]; then
            echo "IPA file not found: $SOURCE_IPA_PATH"
            exit 1
          fi

          cp "$SOURCE_IPA_PATH" "$GITHUB_WORKSPACE/discord.ipa"
          ls -lh "$GITHUB_WORKSPACE/discord.ipa"

      - name: Build tweak and IPA
        run: |
          chmod +x ./build-local.sh
          ./build-local.sh

      - name: Extract app name
        run: |
          APP_NAME=$(grep '^Name:' control | cut -d ' ' -f 2)
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: packages/*.deb
          if-no-files-found: error

      - name: Upload ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ${{ env.APP_NAME }}.ipa
          if-no-files-found: error
