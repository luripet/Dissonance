name: Build Artifacts

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      ipa_repo:
        description: "Private repo that hosts IPA release assets (owner/repo)"
        required: false
        type: string
      ipa_tag:
        description: "Release tag to download from (e.g. v1)"
        required: false
        type: string
      ipa_asset:
        description: "IPA asset file name in that release"
        required: false
        type: string

jobs:
  build:
    runs-on: macos-15
    env:
      IPA_SOURCE_REPO: ${{ github.event.inputs.ipa_repo || secrets.PRIVATE_IPA_REPO || 'luripet/DiscordIPAPrivate' }}
      IPA_SOURCE_TAG: ${{ github.event.inputs.ipa_tag || secrets.PRIVATE_IPA_TAG || 'v1' }}
      IPA_SOURCE_ASSET: ${{ github.event.inputs.ipa_asset || secrets.PRIVATE_IPA_ASSET || 'discord.ipa' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check cache key
        run: |
          echo upstream_heads=`git ls-remote https://github.com/theos/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Set GNU Make path
        run: |
          echo "PATH=$(brew --prefix make)/libexec/gnubin:$PATH" >> $GITHUB_ENV

      - name: Validate Private IPA Source
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_IPA_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "PRIVATE_IPA_TOKEN secret is required."
            exit 1
          fi

          if [ -z "${IPA_SOURCE_REPO}" ] || [ -z "${IPA_SOURCE_TAG}" ] || [ -z "${IPA_SOURCE_ASSET}" ]; then
            echo "IPA source settings are missing. Set workflow inputs or PRIVATE_IPA_REPO/PRIVATE_IPA_TAG/PRIVATE_IPA_ASSET secrets."
            exit 1
          fi

      - name: Download Discord IPA from private release
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_IPA_TOKEN }}
        run: |
          gh release download "${IPA_SOURCE_TAG}" \
            -R "${IPA_SOURCE_REPO}" \
            -p "${IPA_SOURCE_ASSET}" \
            -D .

      - name: Build tweak and IPA
        run: |
          chmod +x ./build-local.sh
          ./build-local.sh

      - name: Extract app name
        run: |
          APP_NAME=$(grep '^Name:' control | cut -d ' ' -f 2)
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: packages/*.deb
          if-no-files-found: error

      - name: Upload ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ${{ env.APP_NAME }}.ipa
          if-no-files-found: error
